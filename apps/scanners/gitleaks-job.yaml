apiVersion: batch/v1
kind: CronJob
metadata:
  name: gitleaks-scanner
  namespace: pipelineguard
spec:
  schedule: "30 */6 * * *"  # Every 6 hours, 30 min offset
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: gitleaks-scanner
            scanner: gitleaks
        spec:
          restartPolicy: OnFailure
          initContainers:
          - name: git-clone
            image: alpine/git:latest
            env:
            - name: TARGET_REPOS
              valueFrom:
                configMapKeyRef:
                  name: scanner-config
                  key: TARGET_REPOS
            command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /repos
              echo "$TARGET_REPOS" | while read -r repo; do
                [ -z "$repo" ] && continue
                repo_name=$(basename "$repo" .git)
                echo "Cloning $repo_name (full history)..."
                git clone "$repo" "/repos/$repo_name" || echo "Failed to clone $repo"
              done
              echo "Clone complete"
            volumeMounts:
            - name: repos
              mountPath: /repos
          containers:
          - name: gitleaks
            image: zricethezav/gitleaks:latest
            command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /results
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)

              for repo_dir in /repos/*/; do
                repo_name=$(basename "$repo_dir")
                echo "Scanning $repo_name for secrets..."

                gitleaks detect --source "$repo_dir" \
                  --report-format json \
                  --report-path "/results/gitleaks-${repo_name}-${TIMESTAMP}.json" \
                  --exit-code 0 || true
              done

              echo "Scan complete. Results:"
              ls -la /results/
            volumeMounts:
            - name: repos
              mountPath: /repos
              readOnly: true
            - name: results
              mountPath: /results
            resources:
              limits:
                memory: "256Mi"
                cpu: "500m"
              requests:
                memory: "128Mi"
                cpu: "100m"
          volumes:
          - name: repos
            emptyDir: {}
          - name: results
            persistentVolumeClaim:
              claimName: scan-results-pvc
