apiVersion: batch/v1
kind: CronJob
metadata:
  name: trivy-scanner
  namespace: pipelineguard
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: trivy-scanner
            scanner: trivy
        spec:
          restartPolicy: OnFailure
          initContainers:
          - name: git-clone
            image: alpine/git:latest
            env:
            - name: TARGET_REPOS
              valueFrom:
                configMapKeyRef:
                  name: scanner-config
                  key: TARGET_REPOS
            command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /repos
              echo "$TARGET_REPOS" | while read -r repo; do
                [ -z "$repo" ] && continue
                repo_name=$(basename "$repo" .git)
                echo "Cloning $repo_name..."
                git clone --depth 1 "$repo" "/repos/$repo_name" || echo "Failed to clone $repo"
              done
              echo "Clone complete. Repos:"
              ls -la /repos/
            volumeMounts:
            - name: repos
              mountPath: /repos
          containers:
          - name: trivy
            image: aquasec/trivy:latest
            env:
            - name: TARGET_REPOS
              valueFrom:
                configMapKeyRef:
                  name: scanner-config
                  key: TARGET_REPOS
            command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /results
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)

              for repo_dir in /repos/*/; do
                repo_name=$(basename "$repo_dir")
                echo "Scanning $repo_name..."

                # Scan for vulnerabilities
                trivy fs --format json --severity MEDIUM,HIGH,CRITICAL \
                  --output "/results/trivy-${repo_name}-${TIMESTAMP}.json" \
                  "$repo_dir" || true
              done

              echo "Scan complete. Results:"
              ls -la /results/
            volumeMounts:
            - name: repos
              mountPath: /repos
              readOnly: true
            - name: results
              mountPath: /results
            resources:
              limits:
                memory: "512Mi"
                cpu: "500m"
              requests:
                memory: "256Mi"
                cpu: "100m"
          volumes:
          - name: repos
            emptyDir: {}
          - name: results
            persistentVolumeClaim:
              claimName: scan-results-pvc
