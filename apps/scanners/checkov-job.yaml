apiVersion: batch/v1
kind: CronJob
metadata:
  name: checkov-scanner
  namespace: pipelineguard
spec:
  schedule: "15 */6 * * *"  # Every 6 hours, 15 min offset
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app: checkov-scanner
            scanner: checkov
        spec:
          restartPolicy: OnFailure
          initContainers:
          - name: git-clone
            image: alpine/git:latest
            env:
            - name: TARGET_REPOS
              valueFrom:
                configMapKeyRef:
                  name: scanner-config
                  key: TARGET_REPOS
            command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /repos
              echo "$TARGET_REPOS" | while read -r repo; do
                [ -z "$repo" ] && continue
                repo_name=$(basename "$repo" .git)
                echo "Cloning $repo_name..."
                git clone --depth 1 "$repo" "/repos/$repo_name" || echo "Failed to clone $repo"
              done
              echo "Clone complete"
            volumeMounts:
            - name: repos
              mountPath: /repos
          containers:
          - name: checkov
            image: bridgecrew/checkov:latest
            command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /results
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)

              for repo_dir in /repos/*/; do
                repo_name=$(basename "$repo_dir")
                echo "Scanning $repo_name with Checkov..."

                checkov -d "$repo_dir" \
                  --framework terraform \
                  --output json \
                  --compact \
                  --soft-fail > "/results/checkov-${repo_name}-${TIMESTAMP}.json" 2>/dev/null || true
              done

              echo "Scan complete. Results:"
              ls -la /results/
            volumeMounts:
            - name: repos
              mountPath: /repos
              readOnly: true
            - name: results
              mountPath: /results
            resources:
              limits:
                memory: "512Mi"
                cpu: "500m"
              requests:
                memory: "256Mi"
                cpu: "100m"
          volumes:
          - name: repos
            emptyDir: {}
          - name: results
            persistentVolumeClaim:
              claimName: scan-results-pvc
