apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-receiver
  namespace: pipelineguard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: webhook-receiver
  namespace: pipelineguard
rules:
- apiGroups: ["batch"]
  resources: ["cronjobs"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webhook-receiver
  namespace: pipelineguard
subjects:
- kind: ServiceAccount
  name: webhook-receiver
  namespace: pipelineguard
roleRef:
  kind: Role
  name: webhook-receiver
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-receiver
  namespace: pipelineguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webhook-receiver
  template:
    metadata:
      labels:
        app: webhook-receiver
    spec:
      serviceAccountName: webhook-receiver
      containers:
      - name: webhook-receiver
        image: pipelineguard/webhook-receiver:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: NAMESPACE
          value: pipelineguard
        - name: WEBHOOK_SECRET
          valueFrom:
            secretKeyRef:
              name: webhook-secret
              key: hmac-secret
              optional: true
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
          requests:
            memory: "64Mi"
            cpu: "50m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-receiver
  namespace: pipelineguard
spec:
  selector:
    app: webhook-receiver
  ports:
  - port: 80
    targetPort: 8080
    name: http
---
apiVersion: v1
kind: Secret
metadata:
  name: webhook-secret
  namespace: pipelineguard
type: Opaque
stringData:
  hmac-secret: "pipelineguard-webhook-secret-change-in-production"
