apiVersion: v1
kind: Secret
metadata:
  name: slack-alerter-secret
  namespace: pipelineguard
type: Opaque
stringData:
  # Replace with real Slack webhook URL
  webhook-url: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-alerter
  namespace: pipelineguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: slack-alerter
  template:
    metadata:
      labels:
        app: slack-alerter
    spec:
      containers:
      - name: alerter
        image: pipelineguard/slack-alerter:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: postgresql
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: pipelineguard
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgresql-secret
              key: POSTGRES_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgresql-secret
              key: POSTGRES_PASSWORD
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: slack-alerter-secret
              key: webhook-url
              optional: true
        - name: OPA_URL
          value: "http://opa:8181"
        - name: POLL_INTERVAL
          value: "60"
        - name: ALERT_SEVERITIES
          value: "CRITICAL,HIGH"
        resources:
          limits:
            memory: "128Mi"
            cpu: "100m"
          requests:
            memory: "64Mi"
            cpu: "50m"
