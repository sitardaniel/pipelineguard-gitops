apiVersion: v1
kind: Namespace
metadata:
  name: pipelineguard
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-secret
  namespace: pipelineguard
type: Opaque
stringData:
  POSTGRES_USER: pipelineguard
  POSTGRES_PASSWORD: localdevpassword
  POSTGRES_DB: pipelineguard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-pvc
  namespace: pipelineguard
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: pipelineguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
      - name: postgresql
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgresql-secret
        volumeMounts:
        - name: postgresql-data
          mountPath: /var/lib/postgresql/data
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
          requests:
            memory: "128Mi"
            cpu: "100m"
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - pipelineguard
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgresql-data
        persistentVolumeClaim:
          claimName: postgresql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: pipelineguard
spec:
  selector:
    app: postgresql
  ports:
  - port: 5432
    targetPort: 5432
