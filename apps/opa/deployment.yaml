apiVersion: v1
kind: ConfigMap
metadata:
  name: opa-policy
  namespace: pipelineguard
data:
  policy.rego: |
    package pipelineguard.policy

    import rego.v1

    # Default deny
    default allow := false
    default alert := false

    # Allow findings that are not critical
    allow if {
      input.severity != "CRITICAL"
    }

    # Alert on critical findings
    alert if {
      input.severity == "CRITICAL"
      input.status == "open"
    }

    # Alert on any secret detected
    alert if {
      input.scanner == "gitleaks"
      input.status == "open"
    }

    # Alert on high severity findings older than 7 days
    alert if {
      input.severity == "HIGH"
      input.status == "open"
    }

    # Violation messages for Slack alerts
    violation contains msg if {
      input.severity == "CRITICAL"
      input.status == "open"
      msg := sprintf("[CRITICAL] %s in %s - %s", [input.cve_id, input.repo, input.package])
    }

    violation contains msg if {
      input.scanner == "gitleaks"
      input.status == "open"
      msg := sprintf("[SECRET] Detected in %s at %s", [input.repo, input.file_path])
    }

    # Summary for compliance
    summary := {
      "total_findings": count(input.findings),
      "critical_count": count([f | some f in input.findings; f.severity == "CRITICAL"]),
      "high_count": count([f | some f in input.findings; f.severity == "HIGH"]),
      "secrets_count": count([f | some f in input.findings; f.scanner == "gitleaks"]),
      "compliant": count([f | some f in input.findings; f.severity == "CRITICAL"]) == 0
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opa
  namespace: pipelineguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opa
  template:
    metadata:
      labels:
        app: opa
    spec:
      containers:
      - name: opa
        image: openpolicyagent/opa:latest
        args:
        - run
        - --server
        - --addr=0.0.0.0:8181
        - --log-level=info
        - /policies
        ports:
        - containerPort: 8181
          name: http
        volumeMounts:
        - name: policy
          mountPath: /policies
          readOnly: true
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"
          requests:
            memory: "64Mi"
            cpu: "50m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8181
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8181
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: policy
        configMap:
          name: opa-policy
---
apiVersion: v1
kind: Service
metadata:
  name: opa
  namespace: pipelineguard
spec:
  selector:
    app: opa
  ports:
  - port: 8181
    targetPort: 8181
    name: http
