apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init-secrets
  namespace: vault
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: init-secrets
        image: hashicorp/vault:1.15
        command:
        - sh
        - -c
        - |
          set -e

          # Wait for Vault to be ready
          until vault status 2>/dev/null; do
            echo "Waiting for Vault..."
            sleep 2
          done

          echo "Vault is ready. Initializing secrets..."

          # Enable KV secrets engine
          vault secrets enable -path=secret kv-v2 || true

          # Store PipelineGuard secrets
          vault kv put secret/pipelineguard/database \
            username=pipelineguard \
            password=localdevpassword \
            host=postgresql.pipelineguard.svc.cluster.local \
            port=5432 \
            database=pipelineguard

          vault kv put secret/pipelineguard/github \
            token=placeholder-replace-with-real-token

          vault kv put secret/pipelineguard/slack \
            webhook_url=placeholder-replace-with-real-webhook

          vault kv put secret/pipelineguard/webhook \
            hmac_secret=$(openssl rand -hex 32)

          echo "Secrets initialized successfully!"

          # List secrets for verification
          echo "Stored secrets:"
          vault kv list secret/pipelineguard/
        env:
        - name: VAULT_ADDR
          value: "http://vault.vault.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          value: "root"
