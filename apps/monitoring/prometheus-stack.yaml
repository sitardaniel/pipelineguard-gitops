apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 65.1.0
    chart: kube-prometheus-stack
    helm:
      values: |
        # Grafana configuration
        grafana:
          enabled: true
          adminPassword: pipelineguard
          service:
            type: ClusterIP
          persistence:
            enabled: false
          additionalDataSources:
            - name: PostgreSQL
              type: postgres
              url: postgresql.pipelineguard.svc.cluster.local:5432
              database: pipelineguard
              user: pipelineguard
              secureJsonData:
                password: localdevpassword
              jsonData:
                sslmode: disable
                maxOpenConns: 5
                maxIdleConns: 2
                connMaxLifetime: 14400

        # Prometheus configuration
        prometheus:
          prometheusSpec:
            retention: 7d
            storageSpec: {}
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 512Mi
                cpu: 500m

        # Alertmanager - disabled for local dev
        alertmanager:
          enabled: false

        # Node exporter - minimal for kind
        nodeExporter:
          enabled: true

        # Pushgateway for scanner jobs
        prometheus-pushgateway:
          enabled: true

        # Reduce resource usage for local development
        kubeStateMetrics:
          enabled: true

        # Disable components not needed locally
        kubeApiServer:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
